baseURL = "https://www.kyrin.one/"
languageCode = "en-us"
title = "Kyrin Labs"
theme = ["loveit"]
buildDrafts = false
buildExpired = false
buildFuture = false

defaultContentLanguage = "en"
hasCJKLanguage = true
enableEmoji = true

[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "Kyrin Labs - Security Research & DLP Investigation"

  [params.author]
    name = "Dalek"
    email = ""

  # Theme features - DISABLE SEARCH as per requirements
  enableSearch = false
  enableToc = true
  enableWordCount = true
  enableReadingPosition = true

  # Custom fonts
  [params.fonts]
    body = "Inter"
    code = "JetBrains Mono"

  # Custom colors - Update to hacker style
  [params.custom]
    background = "#0b0f14"
    text = "#e6edf3"
    highlight = "#00ff9c"
    accent = "#00ff9c"
    card_bg = "#131826"
    border = "#2A3242"

[params.home]
  rss = 10

[params.social]
  GitHub = "https://github.com/freedalek"

[menu]

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 0

[[menu.main]]
  identifier = "techshare"
  name = "TechShare"
  url = "/techshare/"
  weight = 1

[[menu.main]]
  identifier = "case"
  name = "Case Studies"
  url = "/case/"
  weight = 2

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 3

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"
