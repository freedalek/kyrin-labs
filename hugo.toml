baseURL = "https://www.kyrin.one/"
languageCode = "en"
title = "Kyrin Labs"
theme = ["loveit"]
buildDrafts = false
buildExpired = false
buildFuture = false

defaultContentLanguage = "en"
hasCJKLanguage = true
enableEmoji = true

[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "Kyrin Labs - Security Research & DLP Investigation"

  [params.author]
    name = "Dalek"
    email = ""

  # Theme features
  enableSearch = true
  enableToc = true
  enableWordCount = true
  enableReadingPosition = true

  # Custom fonts
  [params.fonts]
    body = "Inter"
    code = "JetBrains Mono"

  # Custom colors
  [params.custom]
    background = "#0B0F1C"
    text = "#C0C0C0"
    highlight = "#3AA5FF"
    accent = "#00FFAA"
    card_bg = "#131826"
    border = "#2A3242"

[params.home]
  rss = 10

[params.social]
  GitHub = "https://github.com/freedalek"

