baseURL = "https://www.kyrin.one/"
languageCode = "en-us"
title = "Kyrin Labs"
theme = ["loveit"]
buildDrafts = false
buildExpired = false
buildFuture = false

defaultContentLanguage = "en"
hasCJKLanguage = true
enableEmoji = true

[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableGitInfo = true

[params]
  description = "Kyrin Labs - Independent Security Research & Technical Analysis"

  [params.author]
    name = "Dalek"
    email = ""

  # Theme features - DISABLE SEARCH as per requirements
  enableSearch = false
  enableToc = true
  enableWordCount = true
  enableReadingPosition = true

  # Custom fonts - Professional academic fonts
  [params.fonts]
    body = "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    code = "'JetBrains Mono', 'SF Mono', Monaco, 'Cascadia Code', monospace"

  # Custom colors - Dark Academic Research Style (inspired by TrailOfBits, Cure53)
  # Professional, clean, minimal color palette
  [params.custom]
    background = "#0d1117"  # GitHub dark background
    text = "#e6edf3"        # Slightly brighter text for better readability
    highlight = "#2f81f7"   # Professional blue (GitHub's primary blue)
    accent = "#1f6feb"      # Slightly darker blue for accents
    card_bg = "#161b22"     # GitHub card background
    border = "#30363d"      # GitHub border
    link = "#58a6ff"        # GitHub link color
    link_hover = "#1f6feb"  # GitHub link hover
    code_bg = "#0d1117"     # GitHub code background
    code_text = "#c9d1d9"   # GitHub code text
    success = "#238636"     # GitHub success green
    warning = "#d29922"     # GitHub warning yellow
    danger = "#f85149"      # GitHub danger red

[params.home]
  rss = 10

[params.social]
  GitHub = "https://github.com/freedalek"

[menu]

[[menu.main]]
  identifier = "home"
  name = "Home"
  url = "/"
  weight = 0

[[menu.main]]
  identifier = "techshare"
  name = "TechShare"
  url = "/techshare/"
  weight = 1

[[menu.main]]
  identifier = "case"
  name = "Case Studies"
  url = "/case/"
  weight = 2

[[menu.main]]
  identifier = "blog"
  name = "Blog"
  url = "/blog/"
  weight = 3

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"
